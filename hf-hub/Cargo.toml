[package]
name = "hf-hub"
version = "1.0.0"
edition = "2024"
description = "Rust client for the Hugging Face Hub API"
license = "Apache-2.0"

[package.metadata.docs.rs]
features = ["blocking"]

[dependencies]
bytes = "1"
reqwest = { version = "0.13", features = ["json", "stream", "multipart", "query"] }
hyper = "1"
tokio = { version = "1", features = ["io-util"] }
tokio-retry = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
url = "2"
futures = "0.3"
typed-builder = "0.23"
globset = "0.4"
base64 = "0.22"
fs4 = "0.13"
pathdiff = "0.2"
tokio-util = { version = "0.7", features = ["io"] }
tracing = "0.1"
hf-xet = { version = "1.5.2" }
sha2 = "0.11"

[features]
default = []
blocking = ["tokio/rt"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile = "3"
rand = "0.10"
serial_test = "3"

