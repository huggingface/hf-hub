# cargo audit configuration.
#
# Advisories listed under `advisories.ignore` are skipped by `cargo audit`.
# Each entry documents why we have knowingly chosen not to act on it — keep
# the reason inline so future reviewers can reassess.

[advisories]
ignore = [
    # Unsoundness in `rand` when a custom global logger calls `rand::rng()`.
    # Two paths bring `rand` into our graph, neither of which is a meaningful
    # exploitation surface for this library:
    #   - `rand 0.8.5` via `tokio-retry` (jitter for retry backoff — not a
    #     security boundary; a non-cryptographic RNG is fine here).
    #   - `rand 0.9.2` via `reqwest -> quinn-proto` (HTTP/3 is not enabled by
    #     any feature we turn on, so this code is effectively unused).
    # Revisit if/when we adopt HTTP/3 or move retry logic off `tokio-retry`.
    "RUSTSEC-2026-0097",
    "RUSTSEC-2026-0104",
    # `quinn-proto` reaches Cargo.lock only as `reqwest`'s optional `http3`
    # dependency, which no feature we enable turns on — `cargo tree -i
    # quinn-proto` resolves to nothing, so it is never compiled or shipped.
    # `cargo audit` flags it from the lockfile regardless. Revisit if/when we
    # adopt HTTP/3.
    "RUSTSEC-2026-0185",
    # Unsound `fmt::Pointer` impl in `crossbeam-epoch` 0.9.18, fixed in
    # 0.9.20. It reaches Cargo.lock only via `criterion` (dev-dependency of
    # the benches crate), and we never format `Atomic`/`Shared` pointers.
    # The internal registry mirror does not serve 0.9.20 yet — bump the
    # lockfile and drop this ignore once it syncs.
    "RUSTSEC-2026-0204",
]
