name: Set up HuggingFace internal package registry proxies
description: >
  Configure cargo and pip/uv to fetch packages from the HuggingFace internal
  registry proxies. The proxies hide package versions younger than 3 days,
  protecting CI from the typosquatting / takeover window of public registry
  supply-chain attacks.

  REQUIRES a runner inside the shared-infra VPC (runs-on: { group: infra-ci }).
  GitHub-hosted runners cannot reach the proxies (ALB is scheme: internal) and
  this action will fail there.

  Reference: https://www.notion.so/huggingface2/Internal-Package-Registry-Proxies-3641384ebcac8199b610c4f98f376986

runs:
  using: composite
  steps:
    - name: Verify proxies are reachable
      shell: bash
      run: |
        set -euo pipefail
        curl -fsS --max-time 10 https://cargo.registries.huggingface.tech/-/ping >/dev/null
        curl -fsS --max-time 10 https://pypi.registries.huggingface.tech/-/ping >/dev/null

    - name: Configure cargo source replacement
      shell: bash
      run: |
        set -euo pipefail
        cargo_home="${CARGO_HOME:-$HOME/.cargo}"
        mkdir -p "$cargo_home"
        cat > "$cargo_home/config.toml" <<'EOF'
        [source.crates-io]
        replace-with = "hf-mirror"

        [source.hf-mirror]
        registry = "sparse+https://cargo.registries.huggingface.tech/"
        EOF

    - name: Export pip / uv index env vars
      shell: bash
      run: |
        {
          echo "PIP_INDEX_URL=https://pypi.registries.huggingface.tech/"
          echo "UV_INDEX_URL=https://pypi.registries.huggingface.tech/"
        } >> "$GITHUB_ENV"
