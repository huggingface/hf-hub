name: Rust

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: nightly
          components: rustfmt

      - name: Set up HF registry proxies
        uses: huggingface/hf-workflows/.github/actions/setup-hf-registry-proxies@21845492ef47d4e46b07a3b2a6e14fd4748c39cc  # main

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  lint:
    name: Lint
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: stable
          components: clippy

      - name: Set up HF registry proxies
        uses: huggingface/hf-workflows/.github/actions/setup-hf-registry-proxies@21845492ef47d4e46b07a3b2a6e14fd4748c39cc  # main

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runs-on:
              group: aws-general-8-plus
            use_hf_registries: true
          - os: windows
            runs-on: windows-latest
            use_hf_registries: false
          - os: macos
            runs-on: macOS-latest
            use_hf_registries: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: stable

      - name: Set up HF registry proxies
        if: matrix.use_hf_registries
        uses: huggingface/hf-workflows/.github/actions/setup-hf-registry-proxies@21845492ef47d4e46b07a3b2a6e14fd4748c39cc  # main

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Build workspace (all targets, all features)
        run: cargo build --workspace --all-targets --all-features --verbose

      - name: Install huggingface_hub CLI
        run: pip install huggingface_hub[cli]

      - name: Run tests
        shell: bash
        run: |
          HF_CI_TOKEN='${{ secrets.HF_CI_TOKEN }}' \
          HF_PROD_TOKEN='${{ secrets.HF_PROD_TOKEN }}' \
          HF_TEST_WRITE=1 \
          cargo test --workspace --all-features --all-targets --verbose

  wasm:
    name: WASM compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust Stable + wasm32 target
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Check hf-hub builds for wasm32-unknown-unknown
        run: ./scripts/verify_wasm.sh

  wasm-test:
    name: WASM integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # The xet download test exercises `hf-xet`'s threaded wasm at runtime,
      # which requires `-Z build-std` (and therefore nightly + `rust-src`).
      - name: Install Rust Nightly + wasm32 target + rust-src
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install wasm-bindgen-cli 0.2.121
        run: cargo install -f wasm-bindgen-cli --version 0.2.121

      # ubuntu-latest runners ship Chrome + chromedriver preinstalled; expose
      # chromedriver via the CHROMEDRIVER env var so wasm-bindgen-test-runner
      # picks it up instead of auto-downloading a copy.
      - name: Locate chromedriver
        run: |
          set -e
          if command -v chromedriver >/dev/null 2>&1; then
            echo "CHROMEDRIVER=$(command -v chromedriver)" >> "$GITHUB_ENV"
          else
            echo "chromedriver not found on PATH" >&2
            exit 1
          fi

      - name: Run wasm integration tests
        run: RUN_IN_BROWSER=1 ./wasm/tests/run_tests.sh

  wasm-test-node:
    # Same suite as `wasm-test`, but uses `run_tests.sh`'s default Node
    # runner (no `RUN_IN_BROWSER`) so wasm-bindgen-test goes through
    # Node.js instead of a headless browser. Faster feedback (no browser
    # startup, no webdriver) and independent verification that the wasm
    # build works under `worker_threads` + Node's SharedArrayBuffer, in
    # addition to the browser harness exercised by `wasm-test`.
    name: WASM integration tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust Nightly + wasm32 target + rust-src
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      # `tokio_with_wasm`'s threaded runtime needs shared-memory + atomics
      # support that Node 20+ provides. Pin to 22 LTS so the runner image
      # update cadence can't silently bump us to an unsupported version.
      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      - name: Install wasm-bindgen-cli 0.2.121
        run: cargo install -f wasm-bindgen-cli --version 0.2.121

      - name: Run wasm integration tests (Node)
        run: ./wasm/tests/run_tests.sh

  docs:
    name: Docs
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: nightly

      - name: Set up HF registry proxies
        uses: huggingface/hf-workflows/.github/actions/setup-hf-registry-proxies@21845492ef47d4e46b07a3b2a6e14fd4748c39cc  # main

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings --cfg docsrs" cargo +nightly doc -p hf-hub --features blocking --no-deps

  audit:
    name: Audit
    runs-on:
      group: aws-general-8-plus
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # 2026-03-27
        with:
          toolchain: stable

      - name: Set up HF registry proxies
        uses: huggingface/hf-workflows/.github/actions/setup-hf-registry-proxies@21845492ef47d4e46b07a3b2a6e14fd4748c39cc  # main

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install cargo audit
        run: cargo install cargo-audit

      - name: Run audit
        run: cargo audit -D warnings
